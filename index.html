                    html += `<span style="color:#F5F0E6;font-size:10px">每家赔付</span>`;
                    html += `<span class="settlement-score">(${baseScore}+${winnerShou10})×${multiplier}=${(baseScore + winnerShou10) * multiplier}分</span>`;
                    html += '</div>';
                }
            } else {
                html += '<div style="color:rgba(245,240,230,0.45);font-size:10px">流局，无胡牌</div>';
            }
            html += '</div>';
            
            // 碰杠包赔计分（仅在非特殊听牌包赔时显示）
            let hasBaopeiScore = G.baopeiScores.some(s => s !== 0);
            if (hasBaopeiScore && !(isBaopei && baopeiPlayer >= 0)) {
                html += '<div class="settlement-section baopei-section">';
                html += '<div class="settlement-section-title baopei-title">碰杠包赔（实时结算）</div>';
                for (let i = 0; i < 4; i++) {
                    if (G.baopeiScores[i] !== 0) {
                        let color = G.baopeiScores[i] >= 0 ? '#7CB97C' : '#C77';
                        let sign = G.baopeiScores[i] >= 0 ? '+' : '';
                        html += `<div class="settlement-row"><span class="settlement-player">${PLAYER_NAMES[i]}</span><span class="settlement-score" style="color:${color}">${sign}${G.baopeiScores[i]}分</span></div>`;
                    }
                }
                html += '</div>';
            }
            
            // 总计分板块
            html += '<div class="settlement-section" style="background:rgba(0,0,0,0.3)">';
            html += '<div class="settlement-section-title">总计分（每人净得分）</div>';
            
            let netScores = [0, 0, 0, 0];
            
            // 计算胡牌者的总凑十分（不排除，用于凑十分结算）
            let winnerTotalShou10 = 0;
            if (winner >= 0) {
                let totalResult = calcShou10(G.hands[winner], G.melds[winner], winner >= 0, [], false);
                winnerTotalShou10 = totalResult.score;
            }
            
            // 凑十分结算
            // 杠后炸：只有自摸胡牌且刚杠过才翻倍
            let shou10Multiplier = (winner >= 0 && G.hasGangHouZha[winner] && huType === 'zimo') ? 2 : 1;
            
            if (isBaopei && baopeiPlayer >= 0 && winner >= 0 && G.isFullBaopei) {
                // 全包：胡牌者的凑十分统一在胡牌计分里处理，这里只处理其他家的凑十分
                // 其他家的凑十分正常结算（不跳过）
                for (let i = 0; i < 4; i++) {
                    if (i === winner) continue;  // 胡牌者的凑十分在胡牌计分里统一处理
                    if (shou10Results[i].score === 0) continue;  // 无凑十则跳过
                    for (let j = 0; j < 4; j++) {
                        if (i === j) continue;
                        // j付i的凑十分
                        netScores[j] -= shou10Results[i].score;
                        netScores[i] += shou10Results[i].score;
                    }
                }
            } else if (isBaopei && baopeiPlayer >= 0 && winner >= 0) {
                // 包赔：此次凑十分已由包赔者付3倍（在碰杠时结算了）
                // 已形成的凑十分：三家分别结算（使用总凑十分）
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (i === j) continue;
                        if (j === winner) continue;
                        netScores[i] -= shou10Results[j].score;
                        netScores[j] += shou10Results[j].score;
                    }
                }
            } else {
                // 正常结算：每家付其他家的凑十分
                // 但胡牌者的凑十分已经包含在自摸/点炮分里，不再重复结算
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (i === j) continue;
                        if (j === winner) continue;  // 跳过胡牌者的凑十分（已在自摸/点炮分中结算）
                        // i付j的凑十分
                        netScores[i] -= shou10Results[j].score;
                        netScores[j] += shou10Results[j].score;
                    }
                }
            }
            
            if (winner >= 0) {
                let baseScore = huType === 'jiutian' ? 3 : (huType === 'zimo' ? 3 : 2);
                let winnerShou10 = shou10Results[winner].score;
                let perPlayer = baseScore + (huType === 'jiutian' ? 0 : winnerShou10);
                
                // 杠后炸翻倍（只有自摸胡牌才算）
                let multiplier = (G.hasGangHouZha[winner] && huType === 'zimo') ? 2 : 1;
                
                if (huType === 'jiutian') {
                    // 九天妖狐：三家都付
                    for (let i = 0; i < 4; i++) {
                        if (i !== winner) {
                            netScores[winner] += 3 * multiplier;
                            netScores[i] -= 3 * multiplier;
                        }
                    }
                } else if (isBaopei && baopeiPlayer >= 0 && G.isFullBaopei) {
                    // 全包：凑十分+点炮分+胡牌者的杠牌分，由包赔者付3倍
                    let winnerGangScore = G.gangScores[winner] || 0;
                    let totalPerPlayer = perPlayer + winnerGangScore;
                    netScores[winner] += totalPerPlayer * multiplier * 3;
                    netScores[baopeiPlayer] -= totalPerPlayer * multiplier * 3;
                    // 胡牌者的杠牌分已纳入全包，清零
                    G.gangScores[winner] = 0;
                    // 其他家的杠牌分会在后面独立结算，三家分别支付
                } else if (isBaopei && baopeiPlayer >= 0) {
                    // 包赔：点炮分三家分别结算（此次凑十分已在碰杠时结算）
                    for (let i = 0; i < 4; i++) {
                        if (i !== winner) {
                            netScores[winner] += perPlayer * multiplier;
                            netScores[i] -= perPlayer * multiplier;
                        }
                    }
                } else {
                    // 自摸/点炮：三家都付（不含杠牌分，杠牌分独立结算）
                    for (let i = 0; i < 4; i++) {
                        if (i !== winner) {
                            netScores[winner] += perPlayer * multiplier;
                            netScores[i] -= perPlayer * multiplier;
                        }
                    }
                }
            }
            
            // 杠牌分数单独结算（仅胡牌时计入，流局不计分）
            // 所有玩家的杠牌分都独立结算，包括胡牌者
            if (winner >= 0) {
                for (let i = 0; i < 4; i++) {
                    netScores[i] += G.gangScores[i];
                }
            }
            
            // 凑十碰杠包赔分数（仅在非全包时计入）
            if (!(isBaopei && baopeiPlayer >= 0 && G.isFullBaopei)) {
                for (let i = 0; i < 4; i++) {
                    netScores[i] += G.baopeiScores[i];
                }
            }
            
            for (let i = 0; i < 4; i++) {
                let color = netScores[i] >= 0 ? '#7CB97C' : '#C77';
                let sign = netScores[i] >= 0 ? '+' : '';
                html += `<div class="settlement-row"><span class="settlement-player">${PLAYER_NAMES[i]}</span><span class="settlement-score" style="color:${color};font-size:14px">${sign}${netScores[i]}分</span></div>`;
            }
            html += '</div>';
            
            // 累计总分板块（只在首次结算时累加）
            if (!G.scoreRecorded) {
                G.scoreRecorded = true;
                G.gameCount++;
                for (let i = 0; i < 4; i++) {
                    G.totalScores[i] += netScores[i];
                }
                // 记录开局
                if (typeof GRAY_DATA !== 'undefined') {
                    GRAY_DATA.recordGameStart();
                }
            }
            
            html += '<div class="settlement-section" style="background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.2)">';
            html += `<div class="settlement-section-title" style="color:#D4AF37">📊 累计总分 (第${G.gameCount}局)</div>`;
            for (let i = 0; i < 4; i++) {
                let totalColor = G.totalScores[i] >= 100 ? '#7CB97C' : (G.totalScores[i] >= 50 ? '#D4AF37' : '#C77');
                html += `<div class="settlement-row"><span class="settlement-player">${PLAYER_NAMES[i]}</span><span class="settlement-score" style="color:${totalColor};font-size:15px">${G.totalScores[i]}分</span></div>`;
            }
            html += '</div>';
            
            // 回放记录板块
            if (G.gameLogs && G.gameLogs.length > 0) {
                html += '<button class="replay-toggle-btn" onclick="toggleReplay()">';
                html += '<span>📜 查看对局回放</span>';
                html += '<span class="arrow">▼</span>';
                html += '</button>';
                
                html += '<div class="settlement-section replay-content" id="replay-content">';
                html += '<div class="settlement-section-title">对局回放</div>';
                html += '<div class="replay-list">';
                
                let startTime = G.gameLogs[0].time;
                for (let log of G.gameLogs) {
                    let elapsed = Math.floor((log.time - startTime) / 1000);
                    let minutes = Math.floor(elapsed / 60);
                    let seconds = elapsed % 60;
                    let timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                    
                    html += `<div class="replay-item">`;
                    html += `<span class="replay-time">${timeStr}</span>`;
                    html += `<span class="replay-msg ${log.type}">${log.msg}</span>`;
                    html += `</div>`;
                }
                
                html += '</div>';
                html += '</div>';
            }
            
            // 手牌展示板块
            html += '<div class="settlement-section">';
            html += '<div class="settlement-section-title">玩家手牌</div>';
            
            for (let i = 0; i < 4; i++) {
                let isWinner = (i === winner);
                let playerName = PLAYER_NAMES[i] + (isWinner ? ' (胡牌)' : (winner < 0 ? ' (流局)' : ''));
                html += `<div style="margin-bottom:8px">`;
                html += `<div style="color:${isWinner ? '#D4AF37' : '#F5F0E6'};font-weight:${isWinner ? '600' : 'normal'};margin-bottom:4px;font-size:11px">${playerName}</div>`;
                html += `<div style="display:flex;flex-wrap:wrap;gap:2px">`;
                
                let sortedHand = [...G.hands[i]].sort((a, b) => {
                    let suitOrder = ['wan', 'tiao', 'tong', 'zhong', 'fa', 'bai'];
                    let orderA = suitOrder.indexOf(a.suit);
                    let orderB = suitOrder.indexOf(b.suit);
                    if (orderA !== orderB) return orderA - orderB;
                    return a.point - b.point;
                });
                
                for (let t of sortedHand) {
                    html += `<div class="settlement-tile">${createTileContent(t)}</div>`;
                }
                html += `</div>`;
                
                if (G.melds[i] && G.melds[i].length > 0) {
                    html += `<div style="margin-top:4px;font-size:9px;color:rgba(245,240,230,0.45)">明牌：`;
                    for (let m of G.melds[i]) {
                        let meldName = m.type === 'peng' ? '碰' : (m.type === 'minggang' ? '明杠' : (m.type === 'angang' ? '暗杠' : (m.type === 'jiagang' ? '加杠' : '杠')));
                        html += `<span style="color:#D4AF37">${meldName}</span> `;
                    }
                    html += `</div>`;
                }
                html += `</div>`;
            }
            html += '</div>';
            
            // 底部按钮
            html += '<div class="settlement-buttons">';
            html += '<button class="btn btn-success" onclick="restartGame()">再来一局</button>';
            html += '<button class="btn btn-warning" onclick="resetTotalScores()">重置分数</button>';
            html += '<button class="btn btn-secondary" onclick="returnToHall()">返回大厅</button>';
            html += '</div>';
            
            panel.innerHTML = html;
            overlay.style.display = 'flex';
            
            // 显示查看结算按钮
            document.getElementById('btn-settlement').style.display = 'flex';
            
            // 结算完成，静默上报灰度数据（用户无感）
            if (typeof GRAY_DATA !== 'undefined') {
                GRAY_DATA.recordGameEnd();
            }
            
            // 初始化拖拽功能
            initSettlementDrag();
            
            } catch (e) {
                console.error('showSettlement 错误:', e);
                alert('结算显示出错: ' + e.message);
            }
        }
        
        // 结算面板拖拽功能
        function initSettlementDrag() {
            let panel = document.getElementById('settlement-panel');
            let isDragging = false;
            let startX, startY, startLeft, startTop;
            
            // 重置面板位置到居中
            panel.style.top = '50%';
            panel.style.left = '50%';
            panel.style.transform = 'translate(-50%, -50%)';
            
            panel.addEventListener('mousedown', function(e) {
                // 只有点击面板本身（非内容区域）才允许拖拽
                if (e.target.closest('.settlement-duo-section, .settlement-section, .settlement-buttons, .replay-toggle-btn, button')) {
                    return;
                }
                isDragging = true;
                panel.classList.add('dragging');
                
                // 获取当前位置
                let rect = panel.getBoundingClientRect();
                startX = e.clientX;
                startY = e.clientY;
                startLeft = rect.left;
                startTop = rect.top;
                
                // 移除transform，使用绝对定位
                panel.style.transform = 'none';
                panel.style.left = startLeft + 'px';
                panel.style.top = startTop + 'px';
            });
            
            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                
                let dx = e.clientX - startX;
                let dy = e.clientY - startY;
                
                panel.style.left = (startLeft + dx) + 'px';
                panel.style.top = (startTop + dy) + 'px';
            });
            
            document.addEventListener('mouseup', function() {
                isDragging = false;
                panel.classList.remove('dragging');
            });
            
            // 触摸设备支持
            panel.addEventListener('touchstart', function(e) {
                if (e.target.closest('.settlement-duo-section, .settlement-section, .settlement-buttons, .replay-toggle-btn, button')) {
                    return;
                }
                isDragging = true;
                panel.classList.add('dragging');
                
                let touch = e.touches[0];
                let rect = panel.getBoundingClientRect();
                startX = touch.clientX;
                startY = touch.clientY;
                startLeft = rect.left;
                startTop = rect.top;
                
                panel.style.transform = 'none';
                panel.style.left = startLeft + 'px';
                panel.style.top = startTop + 'px';
            });
            
            document.addEventListener('touchmove', function(e) {
                if (!isDragging) return;
                
                let touch = e.touches[0];
                let dx = touch.clientX - startX;
                let dy = touch.clientY - startY;
                
                panel.style.left = (startLeft + dx) + 'px';
                panel.style.top = (startTop + dy) + 'px';
            });
            
            document.addEventListener('touchend', function() {
                isDragging = false;
                panel.classList.remove('dragging');
            });
        }

        function showButtons(showPeng, showGang, showHu, showPass, showLiupai, showAngang = false, showJiagang = false) {

        // ===== 游戏流程 =====
        function startGame() {
            document.getElementById('start-wrapper').style.display = 'none';
            document.getElementById('btn-settlement').style.display = 'none';
            
            // 初始化并播放BGM（必须在用户交互中执行）
            AudioMgr.init();
            // 先尝试播放一个短音效来解锁音频
            AudioMgr.play('click');
            // 然后播放BGM
            setTimeout(() => AudioMgr.playBgm(), 100);
            
            // 先初始化游戏状态
            G.deck = shuffle(createDeck());
            G.hands = [[], [], [], []];
            G.melds = [[], [], [], []];
            G.discarded = [];
            G.currentPlayer = 0;
            G.dealer = 0;
            G.round = 1;
            G.lastTile = null;
            G.gameOver = false;
            G.waitingForResponse = false;
            G.winner = -1;
            G.huType = '';
            G.dianpaoProvider = -1;
            G.isBaopei = false;
            G.baopeiPlayer = -1;
            G.isFullBaopei = false;
            G.gangScores = [0, 0, 0, 0];
            G.baopeiScores = [0, 0, 0, 0];
            G.baopeiShou10List = [];
            G.angangTiles = [];
            G.jiagangTile = null;
            G.lanpaiPlayer = -1;
            G.isLanpai = false;
            G.gameLogs = [];
            G.hasGangHouZha = [false, false, false, false];
            G.scoreRecorded = false;
            
            // 隐藏所有按钮
            document.getElementById('btn-liupai').style.display = 'none';
            document.getElementById('btn-buliupai').style.display = 'none';
            document.getElementById('btn-angang').style.display = 'none';
            document.getElementById('btn-jiagang').style.display = 'none';
            document.getElementById('btn-hu').style.display = 'none';
            document.getElementById('btn-peng').style.display = 'none';
            document.getElementById('btn-gang').style.display = 'none';
            
            // 播放掷骰子动画，动画结束后发牌
            playDiceAnimation(() => {
                initDeal();
            });
        }
        
        // 发牌并开始游戏
        function initDeal() {
            deal();
            addLog('游戏开始！', 'key');
            
            // 检测九天妖狐
            for (let i = 0; i < 4; i++) {
                if (checkJiuTianYaoHu(G.hands[i])) {
                    G.winner = i;
                    G.huType = 'jiutian';
                    G.gameOver = true;
                    addLog(`${PLAYER_NAMES[i]} 九天妖狐！`, 'key');
                    showMessage(`${PLAYER_NAMES[i]} 九天妖狐！`, 3000);
                    updateScore();
                    updateUI();
                    return;
                }
            }
            
            // 检测烂牌
            let lanpaiPlayers = [];
            for (let i = 0; i < 4; i++) {
                if (checkLanPai(G.hands[i])) {
                    let count = checkLanPaiCount(G.hands[i]);
                    addLog(`${PLAYER_NAMES[i]} 起手烂牌（${count}种边张字牌）`);
                    lanpaiPlayers.push(i);
                }
            }
            
            if (lanpaiPlayers.includes(0)) {
                G.lanpaiPlayer = 0;
                G.isLanpai = true;
                let count = checkLanPaiCount(G.hands[0]);
                addLog(`你有七幺（${count}种边张字牌），可以选择流牌重开`, 'key');
                // 显示流牌/不流牌按钮
                document.getElementById('btn-liupai').style.display = 'inline-block';
                document.getElementById('btn-buliupai').style.display = 'inline-block';
            }
            
            updateUI();
            
            let tile = draw(0);
            addLog('你摸到: ' + tileText(tile), 'draw');
            AudioMgr.play('draw');
            setStatus('请出牌', true);
            
            G.isMyTurn = true;
            G.currentPlayer = 0;
            updateUI();
            
            checkMyHu();
        }
        
        function onTileClick(idx) {
            if (!G.isMyTurn || G.gameOver || G.waitingForResponse) return;
            if (G.hands[0].length === 0) return;
            
            let tile = G.hands[0][idx];
            addLog('你出牌: ' + tileText(tile), 'discard');
            
            let discarded = discard(0, idx);
            G.isMyTurn = false;
            
            AudioMgr.play('discard');
            updateUI();
            nextTurn();
        }
        
        function nextTurn() {
            if (G.gameOver) return;
            
            let next = (G.lastPlayer + 1) % 4;
            G.currentPlayer = next;
            updateUI();
            
            if (next === 0) {
                setStatus('你的回合 - 摸牌');
                setTimeout(() => {
                    let tile = draw(0);
                    if (tile) {
                        addLog('你摸到: ' + tileText(tile), 'draw');
                        setStatus('请出牌', true);
                        G.isMyTurn = true;
                        updateUI();
                        checkMyHu();
                    }
                }, 500);
            } else {
                setStatus(PLAYER_NAMES[next] + '的回合');
                setTimeout(() => aiTurn(next), 800);
            }
        }
        
        function aiTurn(player) {
            if (G.gameOver) return;
            
            let tile = draw(player);
            if (!tile) return;
            
            addLog(PLAYER_NAMES[player] + ' 摸牌', 'draw');
            updateUI();
            
            if (canHu(G.hands[player], G.melds[player])) {
                setTimeout(() => aiHu(player, null, -1), 500);
                return;
            }
            
            let angangTiles = canAngang(G.hands[player]);
            if (angangTiles.length > 0) {

        function checkAllResponses() {
            let tile = G.lastTile;
            if (!tile) {
                nextTurn();
                return;
            }
            
            let provider = G.lastPlayer;
            
            let responses = [];
            for (let p = 0; p < 4; p++) {
                if (p === provider) continue;
                
                let testHand = [...G.hands[p], tile];
                let canHuPai = canHu(testHand, G.melds[p]);
                let canGangPai = canGang(G.hands[p], tile);
                let canPengPai = canPeng(G.hands[p], tile);
                
                if (canHuPai) {
                    responses.push({ player: p, action: 'hu', priority: 3 });
                } else if (canGangPai) {
                    responses.push({ player: p, action: 'gang', priority: 2 });
                } else if (canPengPai) {
                    responses.push({ player: p, action: 'peng', priority: 1 });
                }
            }
            
            responses.sort((a, b) => {
                if (a.priority !== b.priority) return b.priority - a.priority;
                return a.player - b.player;
            });
            
            if (responses.length === 0) {
                nextTurn();
                return;
            }
            
            let topResponse = responses[0];
            
            if (topResponse.player === 0) {
                let testHand = [...G.hands[0], tile];
                let canDoHu = canHu(testHand, G.melds[0]);
                let canDoGang = canGang(G.hands[0], tile);
                let canDoPeng = canPeng(G.hands[0], tile);
                
                G.waitingForResponse = true;
                setStatus('你可以: ' + (canDoHu ? '胡 ' : '') + (canDoGang ? '杠 ' : '') + (canDoPeng ? '碰 ' : '') + '或 过', true);
                showButtons(canDoPeng, canDoGang, canDoHu, true, false);
                updateUI();
            } else {
                setTimeout(() => {
                    if (topResponse.action === 'hu') {
                        aiHu(topResponse.player, tile, provider);
                    } else if (topResponse.action === 'gang') {
                        aiGang(topResponse.player, tile, provider);
                    } else if (topResponse.action === 'peng') {
                        aiPeng(topResponse.player, tile, provider);
                    }
                }, 500);
            }
        }

        function playerPass() {
            // 立即隐藏按钮，给用户即时反馈
            showButtons(false, false, false, false, false);
            G.waitingForResponse = false;
            G.playerPassed = true;
            addLog('你选择过', 'normal');
            updateUI();
            
            setTimeout(() => {
                checkAIResponses();
            }, 100);
        }
        
        // 检查AI玩家的响应（玩家已选择过）
        function checkAIResponses() {
            let tile = G.lastTile;
            if (!tile) {
                nextTurn();
                return;
            }
            
            let provider = G.lastPlayer;
            
            let responses = [];
            for (let p = 1; p < 4; p++) { // 只检查AI玩家（1,2,3）
                if (p === provider) continue;
                
                let testHand = [...G.hands[p], tile];
                let canHuPai = canHu(testHand, G.melds[p]);
                let canGangPai = canGang(G.hands[p], tile);
                let canPengPai = canPeng(G.hands[p], tile);
                
                if (canHuPai) {
                    responses.push({ player: p, action: 'hu', priority: 3 });
                } else if (canGangPai) {
                    responses.push({ player: p, action: 'gang', priority: 2 });
                } else if (canPengPai) {
                    responses.push({ player: p, action: 'peng', priority: 1 });
                }
            }
            
            responses.sort((a, b) => {
                if (a.priority !== b.priority) return b.priority - a.priority;
                return a.player - b.player;
            });
            
            if (responses.length === 0) {
                G.playerPassed = false; // 重置标志
                nextTurn();
                return;
            }
            
            let topResponse = responses[0];
            
            setTimeout(() => {
                G.playerPassed = false; // 重置标志
                if (topResponse.action === 'hu') {
                    aiHu(topResponse.player, tile, provider);
                } else if (topResponse.action === 'gang') {
                    aiGang(topResponse.player, tile, provider);
                } else if (topResponse.action === 'peng') {
                    aiPeng(topResponse.player, tile, provider);
                }
            }, 500);
        }
        
        function playerLiupai() {
            // 流牌：重新开局
            G.isLanpai = false;
            G.lanpaiPlayer = -1;
            addLog('你选择流牌，重新开局', 'key');
            document.getElementById('btn-liupai').style.display = 'none';
            document.getElementById('btn-buliupai').style.display = 'none';
            // 延迟后重新开局
            setTimeout(() => {
                startGame();
            }, 500);
        }
        
        function playerBuliupai() {
            // 不流牌：继续正常游戏
            G.isLanpai = false;
            G.lanpaiPlayer = -1;
            addLog('你选择不流牌，继续游戏', 'normal');
            document.getElementById('btn-liupai').style.display = 'none';
            document.getElementById('btn-buliupai').style.display = 'none';
            updateUI();
        }
        
        function playerHu() {
            // 支持点炮胡和自摸胡
            let tile = G.lastTile;
            let provider = G.lastPlayer;
            
            // 如果没有lastTile，说明是自摸胡牌
            if (!tile || provider < 0) {
                provider = -1; // 自摸
            }
            
            aiHu(0, tile, provider);
        }
        
        function aiHu(player, tile, provider) {
            G.winner = player;
            G.huType = provider < 0 ? 'zimo' : 'dianpao';
            G.dianpaoProvider = provider; // 保存点炮者
            G.gameOver = true;
            
            // 胡牌时，把胡到/摸到的牌加入手牌
            if (tile) {
                G.hands[player].push(tile);
                sortHand(G.hands[player]);
            }
            
            // 判断是否触发包赔/全包
            // 条件：点炮胡牌 + 打出的牌 + 明牌 + 手牌形成凑十组合（对子/刻子/杠子）
            if (provider >= 0) {
                // 获取胡牌后的手牌（包含胡到的那张）
                let handAfterHu = G.hands[player].slice(); // 已经包含了胡到的那张
                
                // 检查打出的牌是否与明牌+手牌形成凑十组合
                let formsShou10 = false;
                
                // 1. 统计该牌在手牌中的数量（判断是否形成对子/刻子）
                let tileCount = 0;
                for (let t of handAfterHu) {
                    if (t.suit === tile.suit && t.point === tile.point) {
                        tileCount++;
                    }
                }
                
                // 2. 如果形成了对子或刻子（tileCount >= 2），检查是否与明牌凑十
                if (tileCount >= 2) {
                    for (let m of G.melds[player]) {
                        if (!['peng', 'minggang', 'angang'].includes(m.type)) continue;
                        let meldPoint = m.tiles[0].point;
                        let meldSuit = m.tiles[0].suit;
                        if (meldSuit === tile.suit && meldPoint + tile.point === 10 && meldPoint !== tile.point) {
                            formsShou10 = true;
                            break;
                        }
                    }
                }
                
                // 形成凑十组合时，判断包赔还是全包
                if (formsShou10) {
                    let handBeforeHu = G.hands[player].slice(0, -1);
                    let isTing = isTingPai(handBeforeHu, G.melds[player]);
                    
                    G.isBaopei = true;
                    G.baopeiPlayer = provider;
                    G.isFullBaopei = isTing; // 标记是全包还是包赔
                    
                    if (isTing) {
                        addLog(`全包！${PLAYER_NAMES[provider]} 全额包赔`, 'key');
                    } else {
                        addLog(`包赔！${PLAYER_NAMES[provider]} 包赔此次凑十`, 'key');
                    }
                    
                    // 播放包赔动画（胡牌包赔用中配）
                    playBaopeiAnimation(PLAYER_NAMES[provider], 'enhanced');
                }
            }
            
            // 停止BGM，播放胡牌音效
            AudioMgr.stopBgm();
            AudioMgr.play(provider < 0 ? 'huZimo' : 'huDianpao');
            
            let huPlayerName = PLAYER_NAMES[player];
            let huDesc = provider < 0 ? '自摸胡牌' : '胡牌（点炮: ' + PLAYER_NAMES[provider] + '）';
            
            addLog(huPlayerName + ' ' + huDesc + '！', 'key');
            showMessage(huPlayerName + ' ' + huDesc + '！', 3000);
            
            G.waitingForResponse = false;
            showButtons(false, false, false, false, false);
            updateScore();
            updateUI();
        }
        
        // 音量面板切换
        function toggleVolumePanel() {
            let panel = document.getElementById('volumePanel');
            panel.classList.toggle('show');
            
            // 点击其他地方关闭面板
            if (panel.classList.contains('show')) {
                setTimeout(() => {
                    document.addEventListener('click', closeVolumePanelOnClickOutside);
                }, 0);
            }
        }
        
        // 点击外部关闭音量面板
        function closeVolumePanelOnClickOutside(e) {
            let panel = document.getElementById('volumePanel');
            let control = document.querySelector('.volume-control');
            if (!control.contains(e.target)) {
                panel.classList.remove('show');
                document.removeEventListener('click', closeVolumePanelOnClickOutside);
            }
        }
        
        // 设置BGM音量
        function setBgmVolume(value) {
            let vol = value / 100;
            AudioMgr.setBgmVolume(vol);
            document.getElementById('bgmValue').textContent = value + '%';
            
            // 更新按钮图标
            let btn = document.getElementById('btn-mute');
            if (vol === 0) {
                btn.textContent = '🔇';
                btn.classList.add('muted');
            } else {
                btn.textContent = '🔊';
                btn.classList.remove('muted');
            }
        }
        
        // 设置音效音量
        function setSfxVolume(value) {
            let vol = value / 100;
            AudioMgr.setSfxVolume(vol);
            document.getElementById('sfxValue').textContent = value + '%';
        }
        
        // 全屏切换
        function toggleFullscreen() {
            let btn = document.getElementById('btn-fullscreen');
            
            if (!document.fullscreenElement) {
                // 进入全屏
                document.documentElement.requestFullscreen().then(() => {
                    btn.textContent = '⛶';
                    btn.title = '退出全屏';
                }).catch(err => {
                    console.log('全屏请求失败:', err);
                });
            } else {
                // 退出全屏
                document.exitFullscreen().then(() => {
                    btn.textContent = '⛶';
                    btn.title = '全屏';
                }).catch(err => {
                    console.log('退出全屏失败:', err);
                });
            }
        }
        
        // 监听全屏变化（用户按ESC退出）
        document.addEventListener('fullscreenchange', () => {
            let btn = document.getElementById('btn-fullscreen');
            if (!document.fullscreenElement) {
                btn.textContent = '⛶';
                btn.title = '全屏';
            }
        });
        
        // 静音切换（保留兼容）
        function toggleMute() {
            let enabled = AudioMgr.toggle();
            let btn = document.getElementById('btn-mute');
            btn.textContent = enabled ? '🔊' : '🔇';
            btn.classList.toggle('muted', !enabled);
        }
        
        // 回放展开/收起切换
        function toggleReplay() {
            let btn = document.querySelector('.replay-toggle-btn');
            let content = document.getElementById('replay-content');
            if (content) {
                content.classList.toggle('show');
                btn.classList.toggle('expanded');
                let arrow = btn.querySelector('.arrow');
                if (content.classList.contains('show')) {
                    btn.querySelector('span:first-child').textContent = '📜 收起对局回放';
                } else {
                    btn.querySelector('span:first-child').textContent = '📜 查看对局回放';
                }
            }
        }
        
        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('start-wrapper').style.display = 'block';
        });
    </script>
</body>
</html>
